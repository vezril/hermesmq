# HermesMQ service configuration.
# Environment overrides take precedence over the defaults below.
hermesmq {
  http {
    # Bind address for the HTTP server. Override with HERMESMQ_HTTP_HOST.
    host = "0.0.0.0"
    host = ${?HERMESMQ_HTTP_HOST}

    # Bind port for the HTTP server. Override with HERMESMQ_HTTP_PORT.
    port = 8080
    port = ${?HERMESMQ_HTTP_PORT}
  }

  # PostgreSQL connection for the persistence journal/snapshot store.
  # Every field is overridable via HERMESMQ_DB_*.
  db {
    host = "localhost"
    host = ${?HERMESMQ_DB_HOST}

    port = 5432
    port = ${?HERMESMQ_DB_PORT}

    database = "hermesmq"
    database = ${?HERMESMQ_DB_NAME}

    user = "hermes"
    user = ${?HERMESMQ_DB_USER}

    password = "hermes"
    password = ${?HERMESMQ_DB_PASSWORD}
  }
}

pekko {
  loglevel = "INFO"
  loggers = ["org.apache.pekko.event.slf4j.Slf4jLogger"]
  logging-filter = "org.apache.pekko.event.slf4j.Slf4jLoggingFilter"

  # Give the HTTP server time to unbind and drain on shutdown.
  coordinated-shutdown.phases.service-unbind.timeout = 10s

  actor {
    # Journaled events must use an explicit serializer — never Java serialization.
    allow-java-serialization = off
    warn-about-java-serializer-usage = on

    serializers {
      hermes-json = "me.cference.hermesmq.persistence.DomainEventSerializer"
    }
    serialization-bindings {
      "me.cference.hermesmq.domain.TopicEvent"        = hermes-json
      "me.cference.hermesmq.domain.SubscriptionEvent" = hermes-json
    }
  }

  # PostgreSQL is the default persistence profile (pekko-persistence-jdbc).
  # Unit tests override these with an in-memory journal.
  persistence {
    journal.plugin = "jdbc-journal"
    snapshot-store.plugin = "jdbc-snapshot-store"
  }

  # --- Clustering (Feature 10a) ---------------------------------------------
  # These settings are inert until the cluster provider is active. `Main`
  # activates `pekko.actor.provider = cluster`; tests keep the default (local)
  # provider so they don't form clusters or bind the remoting port.
  remote.artery {
    transport = tcp
    canonical.hostname = "127.0.0.1"
    canonical.hostname = ${?HERMESMQ_CLUSTER_HOST}
    canonical.port = 25520
    canonical.port = ${?HERMESMQ_CLUSTER_PORT}
  }
  cluster {
    # Default: a single node seeds itself (one-node cluster, unchanged behavior).
    # Multi-node: set seed-nodes via config/JAVA_OPTS on each node.
    seed-nodes = ["pekko://hermesmq@127.0.0.1:25520"]
    # Split-brain resolver: a partition cannot leave two owners of an entity.
    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"
  }
}

# pekko-persistence-jdbc plugin configuration (top-level, hyphenated path).
pekko-persistence-jdbc {
  shared-databases {
    slick {
      profile = "slick.jdbc.PostgresProfile$"
      db {
        connectionPool = "HikariCP"
        driver = "org.postgresql.Driver"
        url = "jdbc:postgresql://"${hermesmq.db.host}":"${hermesmq.db.port}"/"${hermesmq.db.database}"?reWriteBatchedInserts=true"
        user = ${hermesmq.db.user}
        password = ${hermesmq.db.password}
        numThreads = 5
        maxConnections = 5
        minConnections = 1
      }
    }
  }
}

# Pekko Projection (delivery) — JDBC offset store on the same PostgreSQL.
pekko.projection.jdbc {
  dialect = "postgres-dialect"
  blocking-jdbc-dispatcher.thread-pool-executor.fixed-pool-size = 10
}

jdbc-journal {
  use-shared-db = "slick"
}
jdbc-snapshot-store {
  use-shared-db = "slick"
}
jdbc-read-journal {
  use-shared-db = "slick"
}
